version: "3.9"

services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
      SQS_DLQ_URL: ${SQS_DLQ_URL}
      SQS_QUEUE_NAME: ${SQS_QUEUE_NAME:-rabbitmq-payment-queue}
      SQS_VISIBILITY_TIMEOUT: ${SQS_VISIBILITY_TIMEOUT:-30}
      SQS_WAIT_TIME_SECONDS: ${SQS_WAIT_TIME_SECONDS:-10}
      SQS_MAX_MESSAGES: ${SQS_MAX_MESSAGES:-10}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - payment-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  payment-network:
    driver: bridge